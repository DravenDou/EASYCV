services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["rendercv-web"]
    environment:
      RENDERCV_WEB_HOST: "0.0.0.0"
      RENDERCV_WEB_PORT: "8000"
      RENDERCV_WEB_CORS_ORIGINS: ${RENDERCV_WEB_CORS_ORIGINS:-*}
      RENDERCV_WEB_MAX_YAML_BYTES: ${RENDERCV_WEB_MAX_YAML_BYTES:-500000}
      RENDERCV_WEB_MAX_ARTIFACT_BYTES: ${RENDERCV_WEB_MAX_ARTIFACT_BYTES:-12000000}
      RENDERCV_WEB_VALIDATE_TIMEOUT_SECONDS: ${RENDERCV_WEB_VALIDATE_TIMEOUT_SECONDS:-12}
      RENDERCV_WEB_RENDER_TIMEOUT_SECONDS: ${RENDERCV_WEB_RENDER_TIMEOUT_SECONDS:-60}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RENDERCV_API_BASE_URL: ${NEXT_PUBLIC_RENDERCV_API_BASE_URL:-/rendercv-api}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_RENDERCV_API_BASE_URL: ${NEXT_PUBLIC_RENDERCV_API_BASE_URL:-/rendercv-api}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
